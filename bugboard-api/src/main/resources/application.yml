server:
  servlet:
    context-path: /api
  port: 8080

spring:
  application:
    name: bugboard-api

  datasource:
    url: jdbc:h2:file:./db/bugboard-db
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
